version: '3.8'

services:
  crosspoint-sendbot:
    build: .
    container_name: crosspoint-sendbot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - AUTHORIZED_USER_ID=${AUTHORIZED_USER_ID}
    volumes:
      - ./books:/books
      - ./config:/config
      - ./images:/images/sleep
      - ./src:/app/src
    network_mode: host
